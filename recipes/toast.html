    <h1> Bread Butter Toast </h1>
    <img src = "../images/Toast1.webp" recipe image width = "400" height = "400">
    <h2> Description </h2>
    <p> When you’re craving something sweet in the morning, this butter toast is the ideal breakfast.</p>
    <h3> Ingredients:</h3>
    <ul>
        <li>2 bread slices</li>
        <li>1 tbsp butter</li>
    </ul>
    <h3> Steps: </h3>
    <ol>
        <li>Spread butter on both bread slices.</li>
        <li>Toast them in a pan until golden brown.</li>
        <li>Serve hot.</li>
    </ol>
