    <h1>Banana Milkshake</h1>
    <img src = "../Banana-Milkshake.webp" recipe image width = "400">
    <h2>Description:</h2>
    <p>A classic banana milkshake is thick, creamy, and can be easily customized.</p>
    <h3>Ingredients:</h3>
    <ol>
        <li>1 banana</li>
        <li>1 cup milk</li>
        <li>1 tsp sugar (optional)</li>
    </ol>
    <h3>Steps:</h3>
    <ol>
        <li>Add all ingredients to a blender.</li>
        <li>Blend until smooth.</li>
        <li>Pour into a glass and serve.</li>
    </ol>
